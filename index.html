<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học tiếng Anh giao tiếp</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  font-family: Arial;
  background: #fff8f0;
  text-align: center;
  margin: 0;
}

/* HEADER */
header {
  background: #ffd6ba;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

/* SELECT */
.top-select { margin: 20px; }
select { padding: 8px; font-size: 18px; }

/* PREVIEW */
.preview-box {
  width: 80%;
  height: 400px;
  margin: auto;
  border: 2px solid #a0e7e5;
  border-radius: 10px;
}
.preview-box iframe {
  width: 100%;
  height: 100%;
}

/* WORD LIST */
.word-list {
  width: 65%;
  margin: 20px auto;
  font-size: 24px;
  background: #E0FBE2;
  padding: 15px;
  border-radius: 10px;
}
.word-row {
  display: grid;
  grid-template-columns: 1fr 1fr 40px;
  padding: 6px;
}

/* REVIEW */
/* REVIEW */
.review-box {
  width: 70%;
  margin: 30px auto;
  background: #ffe5ec;
  padding: 20px;
  border-radius: 10px;
  font-size: 26px;
  min-height: 180px; /* 🔥 FIX */
}

#answer {
  min-height: 40px;
  margin-top: 10px;
}

/* SPEAKING */
.speaking-box {
  width: 70%;
  margin: 30px auto;
  background: #e0f0ff;
  padding: 20px;
  border-radius: 10px;
  font-size: 26px;
  min-height: 180px; /* 🔥 FIX */
}

#speakAnswer {
  min-height: 40px;
  margin-top: 10px;
}
/* VIDEO */
.video-box {
  width: 70%;
  margin: 30px auto;
}
.video-box iframe {
  width: 100%;
  height: 400px;
  border-radius: 10px;
}

/* BUTTON */
button {
  margin: 8px;
  padding: 10px 15px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>Tiếng Anh Giao Tiếp - Lớp Anh thầy Kết</header>

<div class="top-select">
<select id="wordList">
  <option value="1">Chào hỏi</option>
  <option value="2">Lesson 1</option>
</select>
</div>

<!-- PREVIEW -->
<div class="preview-box">
  <iframe id="previewFrame"></iframe>
</div>

<!-- WORD LIST -->
<div class="word-list" id="wordContainer"></div>

<!-- REVIEW -->
<div class="review-box">
  <div id="vietWord">Chọn để bắt đầu</div>
  <div id="answer"></div>

  <button onclick="know()">Đã biết</button>
  <button onclick="dontKnow()">Chưa biết</button>
  <button onclick="nextWord()">Tiếp</button>
</div>

<!-- SPEAKING -->
<div class="speaking-box">
  <div id="vietSpeak">Chọn để luyện nói</div>
  <div id="speakAnswer"></div>

  <button onclick="showSpeak()">Hiện đáp án</button>
  <button onclick="nextSpeak()">Câu tiếp</button>
</div>

<!-- VIDEO -->
<div class="video-box">
  <iframe id="videoFrame" allowfullscreen></iframe>
</div>

<script>

/* PREVIEW FILES */
const previewFiles = {
  1:"https://drive.google.com/file/d/1gk4ihNwDNdI1bZbb34C0A8_UJEmEhgp4/preview",
  2:"https://drive.google.com/file/d/1gk4ihNwDNdI1bZbb34C0A8_UJEmEhgp4/preview",
};

/* VIDEO LINKS */
const videoLinks = {
  1:"https://www.youtube.com/embed/Zk_0nvEAUcI",
  2:"https://www.youtube.com/watch?v=qaand6YZhc0"
};

/* VOCAB */
const data = {
  1:[
{en: "Hello", vn: "Xin chào"},
  {en: "Hi", vn: "Chào"},
  {en: "Good morning", vn: "Chào buổi sáng"},
  {en: "Good afternoon", vn: "Chào buổi chiều"},
  {en: "Good evening", vn: "Chào buổi tối"},
  {en: "What’s your name?", vn: "Tên bạn là gì?"},
  {en: "My name is...", vn: "Tên tôi là..."},
  {en: "Nice to meet you", vn: "Rất vui được gặp bạn"},
  {en: "Where are you from?", vn: "Bạn đến từ đâu?"},
  {en: "I’m from...", vn: "Tôi từ..."},
  {en: "What do you do?", vn: "Bạn làm nghề gì?"},
  {en: "I’m a/an...", vn: "Tôi là... (nghề nghiệp)"},
  {en: "What about you? / And you?", vn: "Còn bạn thì sao?"},
  {en: "hometown", vn: "quê hương"},
  {en: "occupation", vn: "nghề nghiệp"},
  {en: "student", vn: "học sinh, sinh viên"},
  {en: "teacher", vn: "giáo viên"},
  {en: "engineer", vn: "kỹ sư"},
  {en: "office worker", vn: "nhân viên văn phòng"}, 
 ],
  2:[
    {en:"Work", vn:"Làm việc"}
  ]
};

/* SPEAKING */
const speakingData = {
  1:[
{
      vn: "Xin chào! Bạn tên là gì?",
      en: "Hello! What’s your name?"
    },
    {
      vn: "Chào! Tôi tên là Linh. Còn bạn?",
      en: "Hi! My name is Linh. What about you?"
    },
    {
      vn: "Tôi là David. Rất vui được gặp bạn!",
      en: "I’m David. Nice to meet you!"
    },
    {
      vn: "Tôi cũng rất vui được gặp bạn!",
      en: "Nice to meet you too!"
    },

{
      vn: "Xin chào! Bạn đến từ đâu?",
      en: "Hello! Where are you from?"
    },
    {
      vn: "Tôi đến từ Việt Nam. Còn bạn?",
      en: "I’m from Vietnam. And you?"
    },
    {
      vn: "Tôi đến từ Canada.",
      en: "I’m from Canada."
    },
    {
      vn: "Ồ, thật tuyệt!",
      en: "Oh, that’s great!"
    },

{
      vn: "Bạn làm nghề gì?",
      en: "What do you do?"
    },
    {
      vn: "Tôi là sinh viên. Còn bạn?",
      en: "I’m a student. What about you?"
    },
    {
      vn: "Tôi là giáo viên.",
      en: "I’m a teacher."
    },
    {
      vn: "Tuyệt đấy!",
      en: "That’s nice!"
    },

  ],
  2:[
    {
      vn:"Tôi làm việc rất chăm chỉ",
      en:"I work very hard"
    }
  ]
};

let currList = 1;
let listCopy = [];
let index = 0;

/* WORD LIST */
function renderWords(){
  const box = document.getElementById("wordContainer");
  const list = data[currList];

  box.innerHTML = list.map((w,i)=>`
    <div class="word-row">
      <span>${w.en}</span>
      <span>${w.vn}</span>
      <input type="checkbox" ${w.tick ? "checked":""} data-index="${i}">
    </div>
  `).join("");

  document.querySelectorAll("#wordContainer input").forEach(cb=>{
    cb.addEventListener("change", moveToTop);
  });
}

function moveToTop(e){
  const i = e.target.dataset.index;

  // đảo trạng thái tick
  data[currList][i].tick = !data[currList][i].tick;

  // lấy item vừa click
  const item = data[currList][i];

  // xoá khỏi vị trí cũ
  data[currList].splice(i,1);

  // đưa lên đầu
  data[currList].unshift(item);

  renderWords();
}

/* REVIEW */
function nextWord(){
  listCopy = [...data[currList]];
  index = Math.floor(Math.random()*listCopy.length);
  document.getElementById("vietWord").innerHTML = listCopy[index].vn;
  document.getElementById("answer").innerHTML = "";
}

function know(){ nextWord(); }
function dontKnow(){
  document.getElementById("answer").innerHTML = listCopy[index].en;
}

/* SPEAKING */
let speakList = [];
let speakIndex = 0;

function nextSpeak(){
  speakList = speakingData[currList] || [];

  if(speakList.length===0){
    document.getElementById("vietSpeak").innerHTML="Chưa có dữ liệu";
    return;
  }

  speakIndex = Math.floor(Math.random()*speakList.length);
  document.getElementById("vietSpeak").innerHTML = speakList[speakIndex].vn;
  document.getElementById("speakAnswer").innerHTML = "";
}

function showSpeak(){
  document.getElementById("speakAnswer").innerHTML = speakList[speakIndex].en;
}

/* LOAD */
function loadList(){
  currList = document.getElementById("wordList").value;

  // preview
  document.getElementById("previewFrame").src = previewFiles[currList];

  // video
  document.getElementById("videoFrame").src = videoLinks[currList];

  renderWords();
  nextWord();
  nextSpeak();
}

document.getElementById("wordList").onchange = loadList;
loadList();

</script>

</body>
</html>
